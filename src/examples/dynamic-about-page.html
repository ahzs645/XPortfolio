<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic About Page Example</title>
    <link href="https://unpkg.com/xp.css@0.2.6/dist/XP.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            font-family: 'MS Sans Serif', sans-serif;
        }
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            float: left;
            margin: 0 20px 10px 0;
        }
        .content-container {
            background: #c0c0c0;
            padding: 20px;
            border: 2px outset #c0c0c0;
            margin: 20px 0;
        }
        .social-links {
            margin: 20px 0;
        }
        .social-links a {
            display: inline-block;
            margin: 5px 10px 5px 0;
            padding: 5px 10px;
            background: #e0e0e0;
            border: 1px outset #e0e0e0;
            text-decoration: none;
            color: black;
        }
        .social-links a:hover {
            border: 1px inset #e0e0e0;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .markdown-content h1 {
            color: #000080;
            border-bottom: 2px solid #000080;
            padding-bottom: 5px;
        }
        .markdown-content h2 {
            color: #000080;
            margin-top: 25px;
        }
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
    </style>
</head>
<body>
    <div class="window" style="width: 800px; margin: 0 auto;">
        <div class="title-bar">
            <div class="title-bar-text">About - <span id="window-title">Loading...</span></div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <div id="loading" class="loading">
                <p>Loading your information...</p>
                <progress></progress>
            </div>
            
            <div id="content" style="display: none;">
                <div class="content-container clearfix">
                    <img id="profile-photo" class="profile-photo" src="" alt="Profile Photo">
                    
                    <div>
                        <h2 id="display-name">Name</h2>
                        <p id="profession"></p>
                        <p>📧 <a id="email" href=""></a></p>
                        <p>📍 <span id="location"></span></p>
                        <p>🌐 <a id="website" href="" target="_blank"></a></p>
                    </div>
                </div>

                <div id="social-media" class="social-links" style="display: none;">
                    <h3>Connect with me:</h3>
                    <div id="social-links"></div>
                </div>

                <div class="content-container">
                    <div id="about-content" class="markdown-content">
                        <!-- Markdown content will be inserted here -->
                    </div>
                </div>

                <div class="content-container">
                    <h3>Configuration Debug Info</h3>
                    <button onclick="showDebugInfo()">Show Debug Info</button>
                    <pre id="debug-info" style="display: none; background: #f0f0f0; padding: 10px; margin: 10px 0; font-size: 11px;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { PortfolioManager } from '../libs/portfolio/portfolioManager.js';

        async function loadAboutPage() {
            try {
                const portfolio = new PortfolioManager();
                await portfolio.initialize();

                // Update window title and display name
                const displayName = portfolio.getDisplayName();
                const osName = portfolio.getOSName();
                document.getElementById('window-title').textContent = osName;
                document.getElementById('display-name').textContent = portfolio.getFullName();

                // Update basic info
                document.getElementById('profession').textContent = portfolio.getProfession() || 'Professional';
                document.getElementById('email').textContent = portfolio.getEmail();
                document.getElementById('email').href = `mailto:${portfolio.getEmail()}`;
                document.getElementById('location').textContent = portfolio.getLocation();
                document.getElementById('website').textContent = portfolio.getWebsite();
                document.getElementById('website').href = portfolio.getWebsite();

                // Update profile photo
                document.getElementById('profile-photo').src = portfolio.getProfilePhotoUrl();
                document.getElementById('profile-photo').alt = `${portfolio.getFullName()} Profile Photo`;

                // Load social media links
                if (portfolio.shouldShowSocialInAbout()) {
                    const socialLinks = portfolio.getSocialLinks();
                    if (socialLinks.length > 0) {
                        document.getElementById('social-media').style.display = 'block';
                        const socialContainer = document.getElementById('social-links');
                        
                        socialLinks.forEach(social => {
                            const link = document.createElement('a');
                            link.href = social.url;
                            link.target = '_blank';
                            link.textContent = `${social.icon} ${social.network}`;
                            socialContainer.appendChild(link);
                        });
                    }
                }

                // Load about content
                const aboutContent = await portfolio.getAboutContent();
                document.getElementById('about-content').innerHTML = aboutContent.html;

                // Store portfolio instance globally for debug
                window.portfolio = portfolio;

                // Hide loading, show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Failed to load about page:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: red;">Error loading content: ${error.message}</p>
                    <p>Please check that config.env and CV.yaml are properly configured.</p>
                `;
            }
        }

        // Global function for debug info
        window.showDebugInfo = function() {
            const debugElement = document.getElementById('debug-info');
            if (debugElement.style.display === 'none') {
                debugElement.style.display = 'block';
                debugElement.textContent = JSON.stringify(window.portfolio.getDebugInfo(), null, 2);
            } else {
                debugElement.style.display = 'none';
            }
        };

        // Load the page
        loadAboutPage();
    </script>
</body>
</html>
