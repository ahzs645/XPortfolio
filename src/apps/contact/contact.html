<!doctype html>
<html lang=en>
<meta charset=UTF-8>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Contact Me</title>
<link href=https://unpkg.com/xp.css@0.2.6/dist/XP.css rel=stylesheet crossorigin=anonymous>
<link href=../../../assets/fonts/tahoma.woff2 rel=preload crossorigin as=font type=font/woff2>
<link href=../../../assets/fonts/tahomabd.woff2 rel=preload crossorigin as=font type=font/woff2>
<style>
    body,
    html {
        font-family: Tahoma, Arial, sans-serif
    }
</style>
<link href=contact.css rel=stylesheet>

<body>
    <script>
        ! function() {
            try {
                window.parent && window.parent !== window && window.parent.postMessage({
                    type: "app-preload-ready",
                    appId: "contact-window"
                }, "*")
            } catch (n) {}
        }()
    </script>
    <div class=content-wrapper>
        <div class=field><label for=contact-to>To:</label> <input class="input readonly" id=contact-to readonly value="{{DEVELOPER_NAME}} <{{DEVELOPER_EMAIL}}>"></div>
        <div class=field><label for=contact-from>From:</label> <input class=input id=contact-from placeholder="Your email address"></div>
        <div class=field><label for=contact-subject>Subject:</label> <input class=input id=contact-subject placeholder="Subject of your message"></div><textarea class=textarea id=contact-message placeholder="Write your message here"></textarea>
    </div>
    <script type="module" src=contact.js></script>
