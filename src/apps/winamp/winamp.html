<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Winamp</title>
    <style>
      html,body,#app{height:100%;margin:0;background:transparent}
      #app{position:relative}
    </style>
    <script src="https://unpkg.com/webamp@1.5.0/built/webamp.bundle.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const album = 'netBloc Vol. 24: tiuqottigeloot';
      const initialTracks = [
        { url:'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Diablo_Swing_Orchestra_-_01_-_Heroines.mp3',
          duration:322.6, metaData:{ title:'Heroines', artist:'Diablo Swing Orchestra', album } },
        { url:'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Eclectek_-_02_-_We_Are_Going_To_Eclecfunk_Your_Ass.mp3',
          duration:190.1, metaData:{ title:'We Are Going To Eclecfunk Your Ass', artist:'Eclectek', album } },
        { url:'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Auto-Pilot_-_03_-_Seventeen.mp3',
          duration:214.6, metaData:{ title:'Seventeen', artist:'Auto-Pilot', album } },
      ];
      try {
        const webamp = new Webamp({ initialTracks });
        const app = document.getElementById('app');
        webamp.renderWhenReady(app).then(() => {
          // Size parent container to fit skin
          const sendSize = () => {
            try {
              const root = document.getElementById('webamp') || app;
              const rect = root.getBoundingClientRect();
              const w = Math.ceil(Math.max(rect.width, root.scrollWidth || 0)) + 32; // generous margin
              const h = Math.ceil(Math.max(rect.height, root.scrollHeight || 0)) + 32;
              window.parent?.postMessage({ type: 'resize-window-to', width: w, height: h }, '*');
            } catch(_){}
          };
          sendSize();
          // Ensure skin is inside our container (prevents offset/cropping)
          try {
            const skinRoot = document.getElementById('webamp');
            if (skinRoot && skinRoot.parentElement !== app) app.appendChild(skinRoot);
          } catch(_){}
          // Hook close/minimize if Webamp exposes it (most builds do)
          try { webamp.onClose(() => window.parent?.postMessage({ type: 'close-window' }, '*')); } catch(_){ }
          try { webamp.onMinimize(() => window.parent?.postMessage({ type: 'minimize-window' }, '*')); } catch(_){ }
          // Observe size changes (e.g., opening EQ/playlist)
          try {
            const root = document.getElementById('webamp') || app;
            const ro = new ResizeObserver(() => sendSize());
            ro.observe(root);
            setTimeout(sendSize, 250);
            setTimeout(sendSize, 800);
          } catch(_){}

          // Drag the host window by grabbing the top 20px of the skin
          let dragging = false;
          const post = (type, e) => { try { window.parent?.postMessage({ type, clientX: e.clientX, clientY: e.clientY }, '*'); } catch(_){} };
          document.addEventListener('mousedown', (e) => {
            const r = app.getBoundingClientRect();
            if (e.button === 0 && e.clientY - r.top <= 20) { dragging = true; post('winamp-drag-start', e); }
          });
          document.addEventListener('mousemove', (e) => { if (dragging) post('winamp-drag-move', e); });
          document.addEventListener('mouseup', (e) => { if (dragging) { dragging = false; post('winamp-drag-end', e); } });
        });
      } catch (e) {
        document.getElementById('app').innerHTML = '<p style="padding:8px;font-family:system-ui">Unable to load Webamp. Check your internet connection.</p>';
      }
    </script>
  </body>
  </html>
