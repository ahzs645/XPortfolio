<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>Minesweeper</title>
    <link href="../../../assets/fonts/tahoma.woff2" rel="preload" crossorigin as="font" type="font/woff2">
    <link href="../../../assets/fonts/tahomabd.woff2" rel="preload" crossorigin as="font" type="font/woff2">
    <style>
        body,
        html {
            font-family: Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="./minesweeper.css" />
</head>
<body>
    <script>
        !function() {
            try {
                window.parent && window.parent !== window && window.parent.postMessage({
                    type: "app-preload-ready",
                    appId: "minesweeper-window"
                }, "*")
            } catch (e) {}
        }()
    </script>
    <div class="mine-window">
        <div class="menu-bar-container">
            <div class="menu-bar">
                <div class="menu-item" data-menu="game">Game</div>
                <div class="menu-item disabled" data-menu="help">Help</div>
                <label class="mobile-only"><input type="checkbox" id="flagMode"/> Flag</label>
            </div>
            <div class="menu-dropdown" id="game-menu" style="display:none">
                <div class="menu-dropdown-item" data-action="new">New</div>
                <div class="menu-dropdown-divider"></div>
                <div class="menu-dropdown-item" data-action="Beginner"><span class="check" id="check-beginner">✓</span>Beginner</div>
                <div class="menu-dropdown-item" data-action="Intermediate"><span class="check" id="check-intermediate"></span>Intermediate</div>
                <div class="menu-dropdown-item" data-action="Expert"><span class="check" id="check-expert"></span>Expert</div>
                <div class="menu-dropdown-divider"></div>
                <div class="menu-dropdown-item" data-action="exit">Exit</div>
            </div>
        </div>
        <div class="mine-content">
            <div class="scorebar">
                <div id="digits-mines" class="digits" aria-label="Mines Remaining"></div>
                <button id="face" class="face" aria-label="New Game"></button>
                <div id="digits-timer" class="digits" aria-label="Time"></div>
            </div>
            <div id="board" class="board"></div>
        </div>
        <select id="difficulty" style="display:none">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Expert">Expert</option>
        </select>
    </div>
    <script src="./minesweeper.js"></script>
</body>
</html>
