<!doctype html>
<html lang=en>
<meta charset=UTF-8>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Paint</title>
<style>
    body,
    html {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #3a6ea5
    }

    .wrap {
        position: absolute;
        inset: 0;
        overflow: hidden
    }

    .wrap iframe {
        position: absolute;
        left: 0;
        right: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>
<div class=wrap><iframe allow="clipboard-read; clipboard-write;" id=jspaint-iframe title="JS Paint - Windows XP Edition" src="build/index.html"></iframe></div>
<script>
    new MutationObserver(() => {
            document.querySelectorAll("iframe#jspaint-iframe")
        }).observe(document.documentElement, {
            childList: !0,
            subtree: !0
        }),
        function() {
            var e = document.getElementById("jspaint-iframe");
            e && e.addEventListener("load", function() {
                try {
                    // Load Windows XP theme when jspaint loads
                    if (e.contentWindow && e.contentWindow.set_theme) {
                        e.contentWindow.set_theme("windows-xp.css");
                    }
                    // Notify parent window
                    window.parent && window.parent !== window && window.parent.postMessage({
                        type: "paint-preload-ready"
                    }, "*")
                } catch (err) {
                    console.log("Could not set theme:", err);
                }
            })
        }()
</script>
