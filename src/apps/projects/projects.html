<link href=../../../assets/fonts/tahoma.woff2 rel=preload crossorigin as=font type=font/woff2>
<link href=../../../assets/fonts/tahomabd.woff2 rel=preload crossorigin as=font type=font/woff2>
<style>
    body,
    html {
        font-family: Tahoma, Arial, sans-serif
    }
</style>
<link href=projects-core.css rel=stylesheet>

<body>
    <script>
        ! function() {
            try {
                window.parent && window.parent !== window && window.parent.postMessage({
                    type: "app-preload-ready",
                    appId: "projects-window"
                }, "*")
            } catch (p) {}
        }()
    </script>
    <div class=projects-bg-gradient aria-hidden=true></div>
    <div class=projects-bg-grid aria-hidden=true></div>
    <div class="app-tight main-layout">
        <div class="side-container side-left"></div>
        <div class="app-tight main-content-area">
            <div class="app-tight grid-container" id=grid-container>
                <main class=projects-grid id=projects-grid-view></main>
            </div>
            <div class="app-tight detail-container-wrapper" id=detail-container style=display:none>
                <div class=detail-content>
                    <div class=detail-container></div>
                </div>
            </div>
        </div>
        <div class="side-container side-right"></div>
    </div>
    <script src=projects.js type=module></script>
