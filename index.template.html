<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{DEVELOPER_FIRSTNAME}} XP — {{DEVELOPER_TITLE}}</title>
    <meta
      name="description"
      content="{{DEVELOPER_NAME}} — {{DEVELOPER_TITLE}}. Explore my work inside a Windows XP-inspired desktop built with React."
    />
    <meta property="og:title" content="{{DEVELOPER_NAME}} — Windows XP Portfolio" />
    <meta
      property="og:description"
      content="Step inside an XP desktop to browse the portfolio of {{DEVELOPER_NAME}}, {{DEVELOPER_TITLE}}."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="{{HTML_PREVIEW_IMAGE}}" />
    <meta property="og:image:alt" content="Windows XP desktop portfolio screenshot" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{DEVELOPER_NAME}} — Windows XP Portfolio" />
    <meta
      name="twitter:description"
      content="Browse {{DEVELOPER_NAME}}'s work through a nostalgic Windows XP interface powered by React."
    />
    <meta name="twitter:image" content="{{HTML_PREVIEW_IMAGE}}" />
    <link rel="icon" type="image/png" href="./assets/gui/boot/favicon.png" />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="stylesheet" href="https://unpkg.com/xp.css@0.2.6/dist/XP.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./src/react-app/styles/app.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__APP_CONFIG = {
        developerName: "{{DEVELOPER_NAME}}",
        developerFirstName: "{{DEVELOPER_FIRSTNAME}}",
        developerLocation: "{{DEVELOPER_LOCATION}}",
        developerEmail: "{{DEVELOPER_EMAIL}}",
        developerTitle: "{{DEVELOPER_TITLE}}",
        developerDisplayName: "{{DEVELOPER_DISPLAY_NAME}}",
        developerOsName: "{{DEVELOPER_OS_NAME}}",
        developerWebsite: "{{DEVELOPER_WEBSITE}}",
        wallpaper: './assets/gui/bgs/blissorg.jpeg',
        desktopPrograms: (
          "{{DESKTOP_PROGRAMS}}" &&
          "{{DESKTOP_PROGRAMS}}" !== "undefined" &&
          "{{DESKTOP_PROGRAMS}}".trim() !== ""
        )
          ? "{{DESKTOP_PROGRAMS}}".split(',').map(item => item.trim()).filter(Boolean)
          : [],
        socialLinks: {
          linkedin: "{{SOCIAL_LINKEDIN_URL}}",
          github: "{{SOCIAL_GITHUB_URL}}",
          instagram: "{{SOCIAL_INSTAGRAM_URL}}"
        }
      };
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script type="module" src="./src/react-app/main.js"></script>
  </body>
</html>
