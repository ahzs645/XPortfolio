<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ Games Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lang-toggle {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .lang-toggle:hover {
            transform: scale(1.05);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
        }

        .tab {
            padding: 10px 24px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.2);
        }

        .tab.active {
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
        }

        /* Game Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .game-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }

        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .game-card .info {
            padding: 12px;
        }

        .game-card .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .game-card .title-zh {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Game Player Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 18px;
        }

        .modal-close {
            padding: 8px 20px;
            background: #e74c3c;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover {
            background: #c0392b;
        }

        .player-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-container ruffle-player {
            max-width: 100%;
            max-height: 100%;
            width: 800px;
            height: 600px;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Back button */
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-right: 15px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Scrollbar */
        .gallery::-webkit-scrollbar {
            width: 8px;
        }

        .gallery::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .gallery::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .gallery::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="headerTitle">QQ Games Arcade</h1>
        <button class="lang-toggle" onclick="toggleLang()" id="langBtn">中文</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="classical" onclick="switchTab('classical')">
            <span class="tab-text" data-en="Classic Games" data-zh="经典游戏">Classic Games</span>
            <span id="classicalCount"></span>
        </button>
        <button class="tab" data-tab="reskin" onclick="switchTab('reskin')">
            <span class="tab-text" data-en="More Games" data-zh="更多游戏">More Games</span>
            <span id="reskinCount"></span>
        </button>
    </div>

    <div class="gallery" id="gallery">
        <div class="loading">
            <div class="spinner"></div>
            <span>Loading games...</span>
        </div>
    </div>

    <!-- Game Player Modal -->
    <div class="modal" id="gameModal">
        <div class="modal-header">
            <div style="display:flex;align-items:center;">
                <button class="back-btn" onclick="closeGame()">← Back</button>
                <span class="modal-title" id="modalTitle">Game</span>
            </div>
            <button class="modal-close" onclick="closeGame()">Close</button>
        </div>
        <div class="player-container" id="playerContainer">
            <!-- Ruffle player will be inserted here -->
        </div>
    </div>

    <script src="/games/qqpenguin/Ruffle/ruffle.js"></script>
    <script>
        let games = { classical: [], reskin: [] };
        let currentTab = 'classical';
        let currentLang = 'en';
        let player = null;

        // Language translations
        const translations = {
            en: {
                title: 'QQ Games Arcade',
                classical: 'Classic Games',
                reskin: 'More Games',
                loading: 'Loading games...',
                langBtn: '中文'
            },
            zh: {
                title: 'QQ游戏厅',
                classical: '经典游戏',
                reskin: '更多游戏',
                loading: '加载游戏中...',
                langBtn: 'EN'
            }
        };

        // Toggle language
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateLanguage();
            renderGames();
        }

        function updateLanguage() {
            const t = translations[currentLang];
            document.getElementById('headerTitle').textContent = t.title;
            document.getElementById('langBtn').textContent = t.langBtn;
            document.querySelectorAll('.tab-text').forEach(el => {
                el.textContent = el.dataset[currentLang];
            });
        }

        // Switch tabs
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderGames();
        }

        // Render game cards
        function renderGames() {
            const gallery = document.getElementById('gallery');
            const gameList = games[currentTab];

            if (!gameList || gameList.length === 0) {
                gallery.innerHTML = '<div class="loading"><span>No games found</span></div>';
                return;
            }

            gallery.innerHTML = gameList.map(game => `
                <div class="game-card" onclick="playGame('${game.id}', '${game.swfUrl}', '${currentLang === 'zh' ? game.titleZh : game.title}')">
                    <img src="${game.cover}" alt="${game.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 150%22><rect fill=%22%23333%22 width=%22200%22 height=%22150%22/><text fill=%22%23666%22 x=%22100%22 y=%2275%22 text-anchor=%22middle%22>No Image</text></svg>'">
                    <div class="info">
                        <div class="title">${currentLang === 'zh' ? game.titleZh : game.title}</div>
                        <div class="title-zh">${currentLang === 'zh' ? game.title : game.titleZh}</div>
                    </div>
                </div>
            `).join('');
        }

        // Wait for Ruffle to be ready
        function waitForRuffle(timeout = 10000) {
            return new Promise((resolve, reject) => {
                const startTime = Date.now();

                function check() {
                    if (window.RufflePlayer && window.RufflePlayer.newest) {
                        resolve(window.RufflePlayer.newest());
                    } else if (Date.now() - startTime > timeout) {
                        reject(new Error('Ruffle failed to load. Please refresh the page.'));
                    } else {
                        setTimeout(check, 100);
                    }
                }
                check();
            });
        }

        // Play game
        async function playGame(id, swfUrl, title) {
            const modal = document.getElementById('gameModal');
            const container = document.getElementById('playerContainer');
            const modalTitle = document.getElementById('modalTitle');

            modalTitle.textContent = title;
            modal.classList.add('active');

            container.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading Ruffle player...</span></div>';

            try {
                // Wait for Ruffle to be ready
                const ruffle = await waitForRuffle();

                container.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading game...</span></div>';

                player = ruffle.createPlayer();
                player.style.width = '800px';
                player.style.height = '600px';

                container.innerHTML = '';
                container.appendChild(player);

                await player.load({
                    url: swfUrl,
                    autoplay: 'on',
                    unmuteOverlay: 'hidden',
                    contextMenu: 'on',
                    warnOnUnsupportedContent: false,
                    scale: 'showAll',
                    forceScale: true,
                });
            } catch (e) {
                container.innerHTML = '<div class="loading"><span style="color:#ff6b6b;">Failed to load game: ' + e.message + '</span><br><button onclick="closeGame()" style="margin-top:20px;padding:10px 20px;cursor:pointer;">Go Back</button></div>';
            }
        }

        // Close game
        function closeGame() {
            const modal = document.getElementById('gameModal');
            const container = document.getElementById('playerContainer');

            modal.classList.remove('active');

            if (player) {
                try {
                    player.remove();
                } catch (e) {}
                player = null;
            }
            container.innerHTML = '';
        }

        // Load games
        async function loadGames() {
            try {
                const response = await fetch('games.json');
                games = await response.json();

                document.getElementById('classicalCount').textContent = `(${games.classical.length})`;
                document.getElementById('reskinCount').textContent = `(${games.reskin.length})`;

                renderGames();
            } catch (e) {
                document.getElementById('gallery').innerHTML = '<div class="loading"><span>Failed to load games</span></div>';
            }
        }

        // Initialize
        loadGames();

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeGame();
        });
    </script>
</body>
</html>
