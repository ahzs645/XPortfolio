<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ Games Arcade</title>
    <link rel="stylesheet" href="https://unpkg.com/xp.css@0.2.6/dist/XP.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            font-size: 11px;
            background: #ece9d8;
            min-height: 100vh;
            color: #000;
        }

        /* XP-style toolbar */
        .toolbar {
            background: linear-gradient(180deg, #f6f9fe 0%, #d3e5fa 50%, #d3e5fa 50%, #d0e3fa 100%);
            border-bottom: 1px solid #89a5c1;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            color: #0046d5;
        }

        .toolbar-title img {
            width: 20px;
            height: 20px;
        }

        .toolbar-spacer {
            flex: 1;
        }

        /* XP-style tabs */
        .tabs {
            background: #ece9d8;
            padding: 8px 8px 0;
            display: flex;
            gap: 2px;
            border-bottom: 1px solid #aca899;
        }

        .tab {
            background: linear-gradient(180deg, #faf8f5 0%, #ece9d8 100%);
            border: 1px solid #aca899;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            padding: 6px 16px;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            color: #000;
            position: relative;
            top: 1px;
        }

        .tab:hover {
            background: linear-gradient(180deg, #fff 0%, #f5f4ef 100%);
        }

        .tab.active {
            background: #fff;
            border-bottom: 1px solid #fff;
            font-weight: bold;
        }

        /* XP-style panel */
        .panel {
            background: #fff;
            border: 1px solid #aca899;
            border-top: none;
            margin: 0 8px 8px;
        }

        /* Game gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 12px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .game-card {
            background: #fff;
            border: 1px solid #d4d0c8;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            overflow: hidden;
        }

        .game-card:hover {
            border-color: #0078d7;
            box-shadow: 0 0 0 1px #0078d7;
        }

        .game-card:hover .game-title {
            background: #0078d7;
            color: #fff;
        }

        .game-card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
            background: #f0f0f0;
        }

        .game-title {
            padding: 6px 8px;
            font-size: 11px;
            text-align: center;
            background: #ece9d8;
            border-top: 1px solid #d4d0c8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-subtitle {
            font-size: 10px;
            color: #666;
            padding: 0 8px 4px;
            text-align: center;
            background: #ece9d8;
        }

        /* Game modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-window {
            background: #ece9d8;
            border: 2px solid #0055e5;
            border-radius: 6px 6px 0 0;
            width: 95%;
            height: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .modal-titlebar {
            background: linear-gradient(180deg, #0a246a 0%, #0a246a 3%, #1157cd 6%, #0a50c3 10%, #0a50c3 90%, #0a246a 94%, #0a246a 100%);
            padding: 4px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
        }

        .modal-titlebar img {
            width: 16px;
            height: 16px;
        }

        .modal-titlebar-spacer {
            flex: 1;
        }

        .modal-close-btn {
            background: linear-gradient(180deg, #e57061 0%, #c72e1c 50%, #c72e1c 50%, #c33425 100%);
            border: 1px solid #3c0c03;
            border-radius: 3px;
            width: 21px;
            height: 21px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .modal-close-btn:hover {
            background: linear-gradient(180deg, #ff8878 0%, #dc4535 50%, #dc4535 50%, #dc4535 100%);
        }

        .modal-content {
            flex: 1;
            background: #000;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }

        .modal-content ruffle-player {
            width: 100% !important;
            height: 100% !important;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            width: 100%;
            height: 100%;
            background: #fff;
        }

        .loading-icon {
            width: 32px;
            height: 32px;
            border: 3px solid #ece9d8;
            border-top-color: #0078d7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Fix xp.css double scrollbar buttons - show only single arrows */
        ::-webkit-scrollbar-button:vertical:start:increment,
        ::-webkit-scrollbar-button:vertical:end:decrement,
        ::-webkit-scrollbar-button:horizontal:start:increment,
        ::-webkit-scrollbar-button:horizontal:end:decrement {
            display: none;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-title">
            <img src="icon.png" alt="">
            <span id="headerTitle">QQ Games Arcade</span>
        </div>
        <div class="toolbar-spacer"></div>
        <button onclick="toggleLang()" id="langBtn">中文</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="classical" onclick="switchTab('classical')">
            <span class="tab-text" data-en="Classic Games" data-zh="经典游戏">Classic Games</span>
            (<span id="classicalCount">0</span>)
        </button>
        <button class="tab" data-tab="reskin" onclick="switchTab('reskin')">
            <span class="tab-text" data-en="More Games" data-zh="更多游戏">More Games</span>
            (<span id="reskinCount">0</span>)
        </button>
    </div>

    <div class="panel">
        <div class="gallery" id="gallery">
            <div class="loading">
                <div class="loading-icon"></div>
                <span>Loading games...</span>
            </div>
        </div>
    </div>

    <!-- Game Modal -->
    <div class="modal" id="gameModal">
        <div class="modal-window">
            <div class="modal-titlebar">
                <img src="icon.png" alt="">
                <span id="modalTitle">Game</span>
                <div class="modal-titlebar-spacer"></div>
                <button class="modal-close-btn" onclick="closeGame()">×</button>
            </div>
            <div class="modal-content" id="playerContainer"></div>
        </div>
    </div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "hidden",
            splashScreen: false,
            preloader: false,
            contextMenu: "on",
            warnOnUnsupportedContent: false,
            showSwfDownload: false,
        };
    </script>
    <script src="/games/qqpenguin/Ruffle/ruffle.js"></script>
    <script>
        let games = { classical: [], reskin: [] };
        let currentTab = 'classical';
        let currentLang = 'en';
        let player = null;

        const translations = {
            en: { title: 'QQ Games Arcade', langBtn: '中文' },
            zh: { title: 'QQ游戏厅', langBtn: 'EN' }
        };

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            document.getElementById('headerTitle').textContent = translations[currentLang].title;
            document.getElementById('langBtn').textContent = translations[currentLang].langBtn;
            document.querySelectorAll('.tab-text').forEach(el => {
                el.textContent = el.dataset[currentLang];
            });
            renderGames();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderGames();
        }

        function renderGames() {
            const gallery = document.getElementById('gallery');
            const gameList = games[currentTab];

            if (!gameList || gameList.length === 0) {
                gallery.innerHTML = '<div class="loading"><span>No games found</span></div>';
                return;
            }

            gallery.innerHTML = gameList.map(game => `
                <div class="game-card" onclick="playGame('${game.id}', '${game.swfUrl}', '${currentLang === 'zh' ? game.titleZh : game.title}')">
                    <img src="${game.cover}" alt="${game.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 140 90%22><rect fill=%22%23ece9d8%22 width=%22140%22 height=%2290%22/><text fill=%22%23888%22 x=%2270%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2212%22>No Image</text></svg>'">
                    <div class="game-title">${currentLang === 'zh' ? game.titleZh : game.title}</div>
                    <div class="game-subtitle">${currentLang === 'zh' ? game.title : game.titleZh}</div>
                </div>
            `).join('');
        }

        function waitForRuffle(timeout = 10000) {
            return new Promise((resolve, reject) => {
                const start = Date.now();
                function check() {
                    if (window.RufflePlayer && window.RufflePlayer.newest) {
                        resolve(window.RufflePlayer.newest());
                    } else if (Date.now() - start > timeout) {
                        reject(new Error('Ruffle failed to load'));
                    } else {
                        setTimeout(check, 100);
                    }
                }
                check();
            });
        }

        async function playGame(id, swfUrl, title) {
            const modal = document.getElementById('gameModal');
            const container = document.getElementById('playerContainer');
            document.getElementById('modalTitle').textContent = title;
            modal.classList.add('active');
            container.innerHTML = '<div class="loading"><div class="loading-icon"></div><span>Loading game...</span></div>';

            try {
                const ruffle = await waitForRuffle();
                player = ruffle.createPlayer();
                player.style.width = '100%';
                player.style.height = '100%';
                container.innerHTML = '';
                container.appendChild(player);
                await player.load({
                    url: swfUrl,
                    autoplay: 'on',
                    unmuteOverlay: 'hidden',
                    splashScreen: false,
                    preloader: false,
                    scale: 'showAll',
                    forceScale: true,
                    letterbox: 'on',
                });
            } catch (e) {
                container.innerHTML = '<div class="loading"><span style="color:#c00;">Error: ' + e.message + '</span><br><button onclick="closeGame()" style="margin-top:16px;">Go Back</button></div>';
            }
        }

        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            if (player) { try { player.remove(); } catch(e){} player = null; }
            document.getElementById('playerContainer').innerHTML = '';
        }

        async function loadGames() {
            try {
                const res = await fetch('games.json');
                games = await res.json();
                document.getElementById('classicalCount').textContent = games.classical.length;
                document.getElementById('reskinCount').textContent = games.reskin.length;
                renderGames();
            } catch (e) {
                document.getElementById('gallery').innerHTML = '<div class="loading"><span>Failed to load games</span></div>';
            }
        }

        loadGames();
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });
    </script>
</body>
</html>
