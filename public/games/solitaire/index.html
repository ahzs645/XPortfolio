<!DOCTYPE html><html lang=en><head>
	<meta charset=utf-8>
	<meta name=viewport content="width=device-width, initial-scale=1">
	<title>Solitaire</title>
	<link rel=stylesheet href="./js-solitaire.ae22070a.css">
	<style>
    /* Fix card sprite */
    .card { background-image: url("./sprite.fff1f211.png") !important; }

    /* Remove window chrome - we use our own window */
    html, body {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      overflow: hidden !important;
    }
    .window {
      background: transparent !important;
      border: none !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      display: flex !important;
      flex-direction: column !important;
    }
    .window__inner {
      border: none !important;
      flex: 1 !important;
      display: flex !important;
      flex-direction: column !important;
    }
    /* Hide title bar and new game button */
    .window__heading,
    .window__actions {
      display: none !important;
    }
    .window__content {
      border: none !important;
      margin: 0 !important;
      flex: 1 !important;
      display: flex !important;
    }
    .window__content-inner {
      background: #008000 !important;
      border: none !important;
      flex: 1 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .solitaire {
      background-color: #008000 !important;
    }
  </style>
</head>
<body style=display:none class=no-js>

<div class=window>
	<div class=window__inner>
		<div class=window__heading>
			<div class=window__heading-icon></div>
			<span id=js-title>Solitaire</span>
		</div>
		<div class=window__actions>
			<button type=button id=js-reset class=new-game>New game</button>
		</div>
		<div class=window__content>
			<div class=window__content-inner>
				<div class=solitaire id=js-solitaire>
					<div id=js-finish class=finish-deck></div>
					<div id=js-board class=board-deck></div>

					<div class=deck>
						<div id=js-deck-pile class=deck__pile></div>
						<div id=js-deck-deal class=deck__deal></div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<script type=module src="./js-solitaire.057c8ed4.js"></script>
