<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Windows Logo Screensaver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #logo {
      position: absolute;
      width: 80px;
      height: auto;
    }
  </style>
</head>
<body>
  <img id="logo" src="/xp.svg" alt="XP Logo">
  <script>
    const img = document.getElementById('logo');
    let x = 10, y = 10;
    let dx = 1.5, dy = 1;

    function animate() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Scale logo based on window size
      const logoSize = Math.max(w * 0.4, 60);
      img.style.width = logoSize + 'px';

      const imgW = img.offsetWidth || logoSize;
      const imgH = img.offsetHeight || logoSize * 0.6;

      x += dx;
      y += dy;

      // Bounce off edges
      if (x <= 0) { x = 0; dx = Math.abs(dx); }
      if (x + imgW >= w) { x = w - imgW; dx = -Math.abs(dx); }
      if (y <= 0) { y = 0; dy = Math.abs(dy); }
      if (y + imgH >= h) { y = h - imgH; dy = -Math.abs(dy); }

      img.style.left = x + 'px';
      img.style.top = y + 'px';

      requestAnimationFrame(animate);
    }

    // Start animation immediately
    requestAnimationFrame(animate);
  </script>
</body>
</html>
