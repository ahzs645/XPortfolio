<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect x="4" y="2" width="40" height="44" rx="2" fill="#FFFFFF" stroke="#7B7B7B" stroke-width="1"/>
  
  <!-- Red header stripe -->
  <rect x="4" y="2" width="40" height="12" rx="2" fill="#CC0000"/>
  <rect x="4" y="10" width="40" height="4" fill="#CC0000"/>
  
  <!-- Adobe A logo in header -->
  <text x="24" y="12" font-family="Arial Black, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">A</text>
  
  <!-- Document lines -->
  <rect x="8" y="18" width="32" height="2" fill="#E0E0E0"/>
  <rect x="8" y="22" width="28" height="2" fill="#E0E0E0"/>
  <rect x="8" y="26" width="32" height="2" fill="#E0E0E0"/>
  <rect x="8" y="30" width="24" height="2" fill="#E0E0E0"/>
  <rect x="8" y="34" width="32" height="2" fill="#E0E0E0"/>
  <rect x="8" y="38" width="20" height="2" fill="#E0E0E0"/>
  
  <!-- PDF badge -->
  <rect x="26" y="32" width="18" height="12" rx="1" fill="#CC0000"/>
  <text x="35" y="41" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">PDF</text>
</svg>
