<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- 3D Document/Page shape -->
  <defs>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Back face (3D effect) -->
  <polygon points="25,15 85,15 85,105 25,105" fill="#c0c0c0"/>

  <!-- Right side (3D depth) -->
  <polygon points="85,15 95,5 95,95 85,105" fill="url(#shadowGradient)"/>

  <!-- Top side (3D depth) -->
  <polygon points="25,15 35,5 95,5 85,15" fill="#d0d0d0"/>

  <!-- Main front face -->
  <polygon points="15,25 75,25 75,115 15,115" fill="url(#pageGradient)" stroke="#808080" stroke-width="1"/>

  <!-- Shortcut arrow icon -->
  <g transform="translate(25, 50)">
    <!-- Arrow box background -->
    <rect x="0" y="0" width="40" height="40" rx="3" fill="#ffffff" stroke="#404040" stroke-width="2"/>

    <!-- Curved arrow -->
    <path d="M8,30 L8,18 C8,12 14,8 22,8 L32,8"
          fill="none" stroke="#404040" stroke-width="4" stroke-linecap="round"/>

    <!-- Arrow head -->
    <polygon points="26,2 36,8 26,14" fill="#404040"/>
  </g>
</svg>