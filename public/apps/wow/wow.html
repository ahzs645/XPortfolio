<!DOCTYPE html>
<html lang="en">
  <meta charset="UTF-8" /><meta
    content="width=device-width,initial-scale=1"
    name="viewport"
  /><title>World of Warcraft</title
  ><style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #wow-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #fallback {
      display: none;
      padding: 40px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      height: 100%;
      background: #f0f0f0;
    }
    #fallback.show {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #fallback h2 {
      margin-bottom: 20px;
      color: #333;
    }
    #fallback p {
      margin-bottom: 20px;
      color: #666;
      line-height: 1.6;
    }
    #fallback a {
      display: inline-block;
      padding: 10px 20px;
      background: #0f61cb;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
    }
    #fallback a:hover {
      background: #0a4a9c;
    }</style
  ><iframe
    id="wow-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
    src="wow-login.html"
    title="World of Warcraft Login Screen"
  ></iframe>
  <div id="fallback">
    <h2>World of Warcraft Login Screen</h2>
    <p>The World of Warcraft login screen is loading...</p>
  </div>
  <script>
    const iframe = document.getElementById("wow-frame"),
      fallback = document.getElementById("fallback");
    let loadTimeout = setTimeout(() => {
      fallback.classList.add("show"), (iframe.style.display = "none");
    }, 5e3);
    if (
      (iframe.addEventListener("load", () => {
        clearTimeout(loadTimeout);
        try {
          const e = iframe.contentDocument || iframe.contentWindow.document;
          e && "about:blank" !== e.location.href
            ? setTimeout(() => {
                iframe.contentWindow.postMessage({ action: "startAudio" }, "*");
              }, 500)
            : (fallback.classList.add("show"), (iframe.style.display = "none"));
        } catch (e) {
          setTimeout(() => {
            iframe.contentWindow.postMessage({ action: "startAudio" }, "*");
          }, 500);
        }
      }),
      window.addEventListener("message", (e) => {
        e.data && "closeWindow" === e.data.action
          ? window.parent &&
            window.parent !== window &&
            window.parent.postMessage({ type: "close-window" }, "*")
          : e.data && "wowAudioPlaying" === e.data.action
          ? window.parent &&
            window.parent.eventBus &&
            window.parent.EVENTS &&
            window.parent.eventBus.publish(window.parent.EVENTS.WOW_PLAYING, {
              programId: "wow",
            })
          : e.data &&
            "wowAudioStopped" === e.data.action &&
            window.parent &&
            window.parent.eventBus &&
            window.parent.EVENTS &&
            window.parent.eventBus.publish(window.parent.EVENTS.WOW_STOPPED, {
              programId: "wow",
            });
      }),
      window.parent && window.parent.eventBus && window.parent.EVENTS)
    ) {
      const e = window.parent.EVENTS,
        t = window.parent.eventBus;
      t.subscribe(e.MUSIC_PLAYER_PLAYING, () => {
        const e = document.getElementById("wow-frame");
        e &&
          e.contentWindow &&
          e.contentWindow.postMessage({ action: "pauseAudio" }, "*");
      }),
        t.subscribe(e.MEDIA_PLAYER_PLAYING, () => {
          const e = document.getElementById("wow-frame");
          e &&
            e.contentWindow &&
            e.contentWindow.postMessage({ action: "pauseAudio" }, "*");
        });
    }
  </script>
</html>
