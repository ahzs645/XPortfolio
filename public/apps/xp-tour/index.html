<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows XP Tour</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 12px;
      background: radial-gradient(circle at 20% 20%, #1b5baa, #0b1c3d 60%);
      font-family: "Trebuchet MS", Tahoma, Arial, sans-serif;
      color: #fff;
    }
    .frame {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: min(960px, 100%);
      margin: 0 auto;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }
    .player-shell {
      position: relative;
      background: #001137;
      border: 2px solid #1b5baa;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 12px 30px rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      overflow: hidden;
      min-height: 520px;
      max-height: 80vh;
    }
    #player-container {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(12, 46, 102, 0.9), rgba(3, 16, 45, 0.95));
    }
    .status {
      font-size: 13px;
      color: #d6e6ff;
      text-align: center;
      opacity: 0.9;
    }
    .status strong {
      color: #fff;
    }
    .help {
      font-size: 12px;
      color: #c8dcff;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 6px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    a {
      color: #9bd1ff;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="title">Tour Windows XP (Flash)</div>
    <div class="player-shell">
      <div id="player-container">
        <div class="status">Loading the original Windows XP Tour via Ruffle…</div>
      </div>
    </div>
    <div class="help">
      <strong>Heads up:</strong> This tour is a Flash experience running through the open-source Ruffle emulator.
      Audio may autoplay; if you don't see the animation, ensure third-party scripts are allowed and try refreshing.
    </div>
  </div>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    const query = new URLSearchParams(window.location.search);
    const fallback = query.get('file') || 'nav.swf';

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('player-container');
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      player.style.width = '100%';
      player.style.height = '100%';
      player.style.border = 'none';

      container.replaceChildren(player);

      player.load(fallback).catch((error) => {
        console.error('Unable to load SWF', error);
        container.innerHTML = `
          <div class="status">
            Unable to start the tour (SWF load error).<br/>
            File attempted: <strong>${fallback}</strong>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
