<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Windows Media Player</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      #player-container {
        width: 100%;
        height: 100%;
      }
      wm-player, local-wm-player {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="player-container"></div>

    <script>
      (async () => {
        const container = document.getElementById("player-container");

        // Check if opened with a media blob URL from query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const mediaUrl = urlParams.get('media');
        const mediaName = urlParams.get('name');

        if (mediaUrl) {
          // Local file mode - load and use wmplayer for local files
          // Load the wmplayer scripts dynamically
          const loadScript = (src) => {
            return new Promise((resolve, reject) => {
              const script = document.createElement('script');
              script.src = src;
              script.onload = resolve;
              script.onerror = reject;
              document.head.appendChild(script);
            });
          };

          const loadStyle = (href) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            document.head.appendChild(link);
          };

          try {
            // Load wmplayer dependencies
            loadStyle('wmplayer/wmplayer.slider.css');
            await loadScript('wmplayer/wmplayer.playlist.js');
            await loadScript('wmplayer/wmplayer.slider.js');
            await loadScript('wmplayer/wmplayer.js');

            const player = document.createElement("wm-player");
            player.id = "player";
            player.setAttribute("src", mediaUrl);
            player.setAttribute("autoplay", "true");
            player.setAttribute("data-theme", "dark");
            player.setAttribute("data-controls-in-tray-left", "shuffle loop separator stop prev");
            player.setAttribute("data-controls-in-tray-right", "next mute volume");
            player.setAttribute("data-controls-in-gutter-right", "fullscreen");
            container.appendChild(player);

            try {
              await player.play();
            } catch (e) {
              console.log("Autoplay prevented:", e);
            }
          } catch (e) {
            console.error("Error loading media player:", e);
            container.innerHTML = '<div style="color: white; padding: 20px;">Error loading media player</div>';
          }
        } else {
          // YouTube playlist mode - load the YouTube player
          const loadScript = (src) => {
            return new Promise((resolve, reject) => {
              const script = document.createElement('script');
              script.src = src;
              script.onload = resolve;
              script.onerror = reject;
              document.head.appendChild(script);
            });
          };

          const loadStyle = (href) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            document.head.appendChild(link);
          };

          try {
            // Load YouTube player dependencies
            loadStyle('mediaPlayer.css');
            await loadScript('mediaPlayerConfig.js');
            await loadScript('mediaPlayer-clean.js');

            // Create the YouTube player
            const ytPlayer = document.createElement("wm-player");
            ytPlayer.id = "player";
            ytPlayer.style.cssText = "--gap-below-controls: 10px";
            container.appendChild(ytPlayer);
          } catch (e) {
            console.error("Error loading YouTube player:", e);
            container.innerHTML = '<div style="color: white; padding: 20px;">Error loading player</div>';
          }
        }
      })();
    </script>
  </body>
</html>
