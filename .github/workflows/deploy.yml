name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# ============================================================================
# CV SOURCE CONFIGURATION
# ============================================================================
# By default, uses CV.yaml and CV.pdf from public/ folder.
#
# To fetch CV from an external repo, set these repository variables:
#   CV_SOURCE_REPO  - e.g., "username/resumerr" (must be public)
#   CV_SOURCE_REF   - branch/tag (default: "main")
#   CV_SOURCE_PATH  - path to CV.yaml (default: "CV.yaml")
#
# PDF will be fetched from the latest release of CV_SOURCE_REPO.
# ============================================================================

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================================
      # OPTIONAL: FETCH CV FROM EXTERNAL REPO
      # ============================================================================

      - name: Fetch CV.yaml from external repo
        if: ${{ vars.CV_SOURCE_REPO != '' }}
        run: |
          echo "Fetching CV.yaml from ${{ vars.CV_SOURCE_REPO }}..."
          CV_REF="${{ vars.CV_SOURCE_REF || 'main' }}"
          CV_PATH="${{ vars.CV_SOURCE_PATH || 'CV.yaml' }}"

          curl -fsSL "https://raw.githubusercontent.com/${{ vars.CV_SOURCE_REPO }}/${CV_REF}/${CV_PATH}" \
            -o public/CV.yaml

          echo "Downloaded CV.yaml from ${{ vars.CV_SOURCE_REPO }}"

      - name: Fetch CV.pdf from external repo releases
        if: ${{ vars.CV_SOURCE_REPO != '' }}
        run: |
          echo "Fetching latest PDF from ${{ vars.CV_SOURCE_REPO }} releases..."

          # Get latest release assets
          RELEASE_API="https://api.github.com/repos/${{ vars.CV_SOURCE_REPO }}/releases/latest"
          PDF_URL=$(curl -fsSL "$RELEASE_API" | jq -r '.assets[] | select(.name | endswith(".pdf")) | .browser_download_url' | head -1)

          if [ -n "$PDF_URL" ] && [ "$PDF_URL" != "null" ]; then
            curl -fsSL "$PDF_URL" -o public/CV.pdf
            echo "Downloaded CV.pdf from release"
          else
            echo "No PDF found in releases, keeping existing CV.pdf"
          fi

      # ============================================================================
      # BUILD EXTERNAL APPS (Submodules)
      # ============================================================================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Build and deploy external apps
        run: node scripts/build-externals.js

      # ============================================================================
      # BUILD MAIN APP
      # ============================================================================

      - name: Install main app dependencies
        run: npm install

      - name: Lint main app
        run: npm run lint

      - name: Build main app
        env:
          VITE_BASE: /
        run: npm run build

      # ============================================================================
      # DEPLOY TO GITHUB PAGES
      # ============================================================================

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
